name: test

on:
  push:
  pull_request:

jobs:
  powershell:
    runs-on: windows-latest
    strategy:
      matrix:
        shell: [powershell, pwsh]
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: ${{ matrix.shell }}
        run: Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run tests
        shell: ${{ matrix.shell }}
        run: Invoke-Pester .\tests\CodexMonitor.Tests.ps1 -Output Detailed
