name: test

on:
  push:
  pull_request:

jobs:
  windows-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Pester
        shell: powershell
        run: Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run tests
        shell: powershell
        run: Invoke-Pester .\tests\CodexMonitor.Tests.ps1 -Output Detailed

  powershell-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run tests
        shell: pwsh
        run: Invoke-Pester .\tests\CodexMonitor.Tests.ps1 -Output Detailed
